<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="chat.css"> <!-- Link to external CSS -->
    <title>Chat</title>
</head>
<body>
    <div class="chat-container">
        <div class="sidebar">
            <h2>User List</h2>
            <div class="user-list">
                <!-- Dynamically populated user list -->
            </div>
            <button class="create-group">Create Group</button>
        </div>
        <div class="chat-area">
            <div class="chat-header">
                <h3>Selected User</h3>
            </div>
            <div class="message-area" id="chatList">
                <!-- Messages dynamically added here -->
            </div>
            <form class="message-input" id="messageForm">
                <input type="text" id="messageInput" placeholder="Type your message here..." required>
                <button type="submit">Send</button>
            </form>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
